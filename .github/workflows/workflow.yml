name: CI

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'main'
      - 'dev'
      - 'feature/*'
      - 'hotfix/*'
  workflow_dispatch:
    inputs:
      run_integration_matrix:
        description: "Run Keycloak compatibility matrix"
        required: false
        type: boolean
        default: false

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync package version from release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: make release-bump

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.22"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=${{ github.workspace }}/src" >> $GITHUB_ENV

      - name: Install the project
        run: uv sync --dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run Ty
        run: uv run ty check src

      - name: Run Pytests
        run: uv run pytest -q

      - name: Audit Python dependencies for known CVEs
        run: |
          uv export --frozen --format requirements.txt --all-groups --no-emit-project -o /tmp/requirements-audit.txt
          uv run pip-audit --strict --requirement /tmp/requirements-audit.txt --no-deps

  build:
    runs-on: ubuntu-latest
    needs: checks
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync package version from release tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: make release-bump

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.22"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install the project
        run: uv sync

      - name: Build the project
        run: uv build

      - name: Generate SBOM (CycloneDX JSON)
        run: uvx cyclonedx-py environment --output-format JSON --output-file dist/sbom.cyclonedx.json

      - name: Enforce SBOM license policy
        run: python bin/check_sbom_licenses.py --sbom dist/sbom.cyclonedx.json --policy .license-policy.toml

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: dist/*

  integration-keycloak-matrix:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_integration_matrix
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        keycloak-version: ["24.0", "25.0", "26.0"]
    services:
      keycloak:
        image: quay.io/keycloak/keycloak:${{ matrix.keycloak-version }}
        ports:
          - 8080:8080
        env:
          KC_BOOTSTRAP_ADMIN_USERNAME: admin
          KC_BOOTSTRAP_ADMIN_PASSWORD: admin
        options: >-
          --health-cmd="bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.22"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install the project
        run: uv sync --dev

  publish:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/feature/14052026-publish'
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: package
          path: dist

      - name: Strip non-package files before PyPI upload
        run: find dist -mindepth 1 -maxdepth 1 ! -name '*.whl' ! -name '*.tar.gz' -delete

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}


      - name: Clean up
        run: |
          rm -rf dist

  release:
    runs-on: ubuntu-latest
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: package
          path: dist

      - name: Create GitHub Release with autogenerated notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
