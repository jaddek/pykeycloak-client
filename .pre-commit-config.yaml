exclude: '^tests/|^examples/|^src/pykeycloak/core/urls\.py'

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.13
    hooks:
      - id: ruff-check
        args: [ --fix, --exit-non-zero-on-fix ]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-case-conflict
      - id: check-toml
      - id: debug-statements
      - id: detect-private-key

  - repo: local
    hooks:
      - id: ty-check
        name: ty check
        entry: uv run ty check src
        language: system
        pass_filenames: false
      - id: pip-audit
        name: pip-audit (CVE scan)
        entry: /bin/sh -lc 'uv export --frozen --format requirements.txt --all-groups --no-emit-project -o /tmp/requirements-audit.txt && uv run pip-audit --strict --requirement /tmp/requirements-audit.txt --no-deps'
        language: system
        pass_filenames: false
      - id: trivy-fs
        name: trivy fs (vuln/secret/misconfig)
        entry: /bin/sh -lc 'if ! command -v trivy >/dev/null 2>&1; then echo "trivy not installed locally; skipping (CI still enforces this check)."; exit 0; fi; trivy fs --severity HIGH,CRITICAL --ignore-unfixed --scanners vuln,secret,misconfig .'
        language: system
        pass_filenames: false
