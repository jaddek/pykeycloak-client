site_name: PyKeycloak
site_description: Async Keycloak client with automated token management
site_url: https://jaddek.github.io/PyKeycloak/
repo_url: https://github.com/jaddek/pykeycloak-client
repo_name: jaddek/PyKeycloak

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Services:
      - Auth: services/auth.md
      - UMA: services/uma.md
      - Users: services/users.md
      - Roles: services/roles.md
      - Sessions: services/sessions.md
      - Clients: services/clients.md
      - Authz Overview: services/authz.md
      - Authz Resource: services/authz-resource.md
      - Authz Scope: services/authz-scope.md
      - Authz Permission: services/authz-permission.md
      - Authz Policy: services/authz-policy.md
      - Well-known: services/well-known.md
  - MCP Server: mcp.md
  - Models:
      - Payloads: models/payloads.md
      - Queries: models/queries.md
  - API Reference: api-reference.md
